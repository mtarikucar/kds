name: DB Baseline (manual)

# One-shot remedial workflow for the "hidden P3005" case the doctor
# reports: the database already has every migration's schema, but
# `_prisma_migrations` is empty so prisma refuses to deploy. This
# workflow loops over `prisma/migrations/*` and marks each one as
# `--applied`, which is what the operator would do over SSH.
#
# Guard rails:
#   - manual trigger only (workflow_dispatch). It never runs on push.
#   - operator must type the exact confirmation phrase, per environment,
#     before any state change is attempted.
#   - dry-run mode prints the resolve plan without touching the DB.
#   - prod-rollback IS available via deploy.sh — this workflow is the
#     dual-purpose remediation for a DB that was never baselined, NOT
#     a routine maintenance lever.

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Which environment to baseline'
        required: true
        type: choice
        options:
          - staging
          - prod
      mode:
        description: 'dry-run = list only, apply = actually mark each migration --applied'
        required: true
        default: 'dry-run'
        type: choice
        options:
          - dry-run
          - apply
      confirm:
        description: 'Type the environment name back (e.g. "staging" or "prod") to confirm.'
        required: true
        type: string

permissions:
  contents: read

# Don't let a baseline race with a deploy.
concurrency:
  group: ${{ inputs.environment }}-deploy
  cancel-in-progress: false

env:
  SERVER_HOST: '38.242.233.166'

jobs:
  baseline:
    name: ${{ inputs.environment }} baseline (${{ inputs.mode }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Validate confirmation
        run: |
          set -euo pipefail
          if [ "${{ inputs.confirm }}" != "${{ inputs.environment }}" ]; then
            echo "::error::Confirmation '${{ inputs.confirm }}' does not match environment '${{ inputs.environment }}'."
            echo "::error::Refusing to proceed."
            exit 1
          fi
          echo "Confirmation OK — environment=${{ inputs.environment }}, mode=${{ inputs.mode }}."

      - name: Checkout (for composite SSH action)
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: ./.github/actions/setup-ssh
        with:
          ssh-private-key-base64: ${{ secrets.SSH_PRIVATE_KEY_BASE64 }}
          ssh-known-hosts: ${{ secrets.SSH_KNOWN_HOSTS }}
          server-host: ${{ env.SERVER_HOST }}

      - name: Resolve container + DB names from environment
        id: cfg
        run: |
          set -euo pipefail
          if [ "${{ inputs.environment }}" = "prod" ]; then
            echo "backend_container=kds_backend_prod"       >> "$GITHUB_OUTPUT"
            echo "postgres_container=kds_postgres_prod"     >> "$GITHUB_OUTPUT"
            echo "db_name=restaurant_pos_prod"              >> "$GITHUB_OUTPUT"
          else
            echo "backend_container=kds_backend_staging"    >> "$GITHUB_OUTPUT"
            echo "postgres_container=kds_postgres_staging"  >> "$GITHUB_OUTPUT"
            echo "db_name=restaurant_pos_staging"           >> "$GITHUB_OUTPUT"
          fi

      - name: DB sanity + baseline gate
        env:
          PG: ${{ steps.cfg.outputs.postgres_container }}
          DB: ${{ steps.cfg.outputs.db_name }}
        run: |
          set -eo pipefail
          # Helper: run a single SELECT against the staging/prod DB
          # and print the trimmed scalar. -tAc = tuples-only, unaligned.
          q() {
            ssh root@${{ env.SERVER_HOST }} \
              "docker exec $PG psql -U postgres -d $DB -tAc \"$1\"" \
              | tr -d ' \r\n'
          }

          # 1) User-table count is always safe to query.
          user_tables=$(q "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema='public' AND table_name NOT LIKE '_prisma%'")

          # 2) Migration-table presence — has_table is 't' or 'f'.
          # Postgres won't lazily skip the ELSE branch of a CASE, so we
          # CAN'T combine this into one query. The earlier attempt died
          # with "relation _prisma_migrations does not exist" at parse
          # time even though to_regclass returned NULL.
          has_table=$(q "SELECT to_regclass('public._prisma_migrations') IS NOT NULL")

          # 3) Applied count only if the migrations table exists.
          if [ "$has_table" = "t" ]; then
            applied_migs=$(q "SELECT COUNT(*) FROM _prisma_migrations WHERE finished_at IS NOT NULL AND rolled_back_at IS NULL")
          else
            applied_migs=0
          fi

          user_tables="${user_tables:-?}"
          applied_migs="${applied_migs:-?}"
          echo "user_tables        = $user_tables"
          echo "has_prisma_table   = $has_table"
          echo "applied_migrations = $applied_migs"

          # Best-effort audit dump (last 20 rows if the table exists).
          if [ "$has_table" = "t" ]; then
            ssh root@${{ env.SERVER_HOST }} "docker exec $PG psql -U postgres -d $DB -c \"SELECT migration_name, finished_at IS NOT NULL AS finished, rolled_back_at IS NOT NULL AS rolled_back FROM _prisma_migrations ORDER BY started_at DESC LIMIT 20;\" 2>&1 || true"
          else
            echo "(no _prisma_migrations table — audit dump skipped)"
          fi

          # Hard fail if either probe value is non-numeric — we'd rather
          # abort than make a baseline decision on a parse error.
          case "$user_tables$applied_migs" in
            *[!0-9]*) echo "::error::Probe parse failure (user_tables='$user_tables' applied='$applied_migs'). Refusing to baseline."; exit 1 ;;
          esac

          if [ "$user_tables" -eq 0 ]; then
            echo "::error::Database has no user tables — there's nothing to baseline."
            echo "::error::A fresh DB should run \`prisma migrate deploy\` instead."
            exit 1
          fi
          # applied_migs > 0 is OK now — the apply step is idempotent
          # and skips per-migration rows that are already applied. This
          # also makes a half-finished previous run safe to resume.
          echo "Safe to baseline: $user_tables user tables, $applied_migs migrations already applied."

      - name: List migrations that would be applied
        env:
          BACKEND: ${{ steps.cfg.outputs.backend_container }}
        run: |
          set -euo pipefail
          # Audit dump only — the apply step recomputes the plan to
          # avoid relying on multi-line GITHUB_OUTPUT plumbing (which
          # silently passes only the first line in some shell contexts).
          plan=$(ssh root@${{ env.SERVER_HOST }} \
            "docker exec $BACKEND ls /app/prisma/migrations" \
            | grep -E '^[0-9]' | sort)
          count=$(printf '%s\n' "$plan" | grep -c .)
          echo "Migrations on disk (will be checked):"
          printf '%s\n' "$plan" | sed 's/^/  - /'
          echo "Total: $count"

      - name: Apply baseline
        if: inputs.mode == 'apply'
        env:
          BACKEND: ${{ steps.cfg.outputs.backend_container }}
          PG: ${{ steps.cfg.outputs.postgres_container }}
          DB: ${{ steps.cfg.outputs.db_name }}
        run: |
          set -euo pipefail

          # Recompute plan locally — using a here-string sidesteps the
          # multi-line GITHUB_OUTPUT issue we hit before.
          plan=$(ssh root@${{ env.SERVER_HOST }} \
            "docker exec $BACKEND ls /app/prisma/migrations" \
            | grep -E '^[0-9]' | sort)

          # Pull the set of migrations already marked applied, so we
          # can skip them and stay idempotent (a half-finished previous
          # apply can simply be re-run).
          if [ "$(ssh root@${{ env.SERVER_HOST }} "docker exec $PG psql -U postgres -d $DB -tAc \"SELECT to_regclass('public._prisma_migrations') IS NOT NULL\"" | tr -d ' \r\n')" = "t" ]; then
            applied_set=$(ssh root@${{ env.SERVER_HOST }} \
              "docker exec $PG psql -U postgres -d $DB -tAc \"SELECT migration_name FROM _prisma_migrations WHERE finished_at IS NOT NULL AND rolled_back_at IS NULL\"" \
              | tr -d ' \r' | sort -u)
          else
            applied_set=""
          fi

          echo "Already-applied rows: $(printf '%s\n' "$applied_set" | grep -c .)"
          echo "Baseline plan:        $(printf '%s\n' "$plan" | grep -c .)"

          new=0; skipped=0
          # `<<<` here-string is bulletproof; while-IFS-read consumes it
          # line by line, no heredoc indentation gotchas.
          while IFS= read -r m; do
            [ -z "$m" ] && continue
            if printf '%s\n' "$applied_set" | grep -qx "$m"; then
              echo "  skip $m (already applied)"
              skipped=$((skipped + 1))
              continue
            fi
            echo "→ $m"
            # -n redirects ssh's stdin from /dev/null. Without it, ssh
            # eats the rest of the here-string the `while` is reading
            # from, and the loop exits after a single iteration. This
            # is the classic "ssh in a loop" gotcha.
            ssh -n root@${{ env.SERVER_HOST }} \
              "docker exec $BACKEND npx --no-install prisma migrate resolve --applied $m"
            new=$((new + 1))
          done <<< "$plan"

          echo "Done: $new newly baselined, $skipped already applied."
          echo "--- migrate status after baseline ---"
          ssh root@${{ env.SERVER_HOST }} \
            "docker exec $BACKEND npx --no-install prisma migrate status" \
            || true

      - name: Dry-run summary
        if: inputs.mode == 'dry-run'
        run: |
          echo "Dry-run only — no DB changes were made."
          echo "Re-run this workflow with mode=apply to actually baseline."

      - name: Post-baseline DB sanity (apply mode only)
        if: inputs.mode == 'apply'
        env:
          PG: ${{ steps.cfg.outputs.postgres_container }}
          DB: ${{ steps.cfg.outputs.db_name }}
        run: |
          set -euo pipefail
          ssh root@${{ env.SERVER_HOST }} "
            docker exec $PG psql -U postgres -d $DB -c \
              \"SELECT COUNT(*) AS now_applied FROM _prisma_migrations WHERE finished_at IS NOT NULL AND rolled_back_at IS NULL;\"
          "
          echo "Now re-trigger the deploy workflow (push to test, or workflow_dispatch)."
