name: Release Deployment

# Trigger on annotated version tags. Manual dispatch is preserved for
# operator recovery (e.g. re-running the same tag after fixing prod DB).
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v2.8.77)'
        required: true
        type: string

permissions:
  contents: write    # softprops/action-gh-release needs this
  packages: write    # docker login + push to ghcr.io
  pull-requests: read

# Sequential, no cancellation: if two tags get pushed back-to-back we
# want them deployed in order, not the second one stomping on the first.
concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  NODE_VERSION: '18.x'
  SERVER_HOST: '38.242.233.166'
  GHCR_BASE: 'ghcr.io/mtarikucar/kds'

jobs:
  # -------------------------------------------------------------------
  # Gate the deploy on three things being true BEFORE we burn build time:
  #   1. Production API is currently healthy (deploying on a fire = worse fire)
  #   2. All required secrets are present in the runner env
  #   3. SSH to the production box works
  # Any of these failing fails the whole workflow; downstream jobs use
  # `needs: pre-check` so they never start on a broken foundation.
  # -------------------------------------------------------------------
  pre-check:
    name: Pre-flight gate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      # composite action under .github/actions/ requires the repo to be
      # checked out before `uses: ./...` can resolve.
      - name: Checkout (for composite action)
        uses: actions/checkout@v4

      - name: Setup SSH (early — pre-check probes need it)
        uses: ./.github/actions/setup-ssh
        with:
          ssh-private-key-base64: ${{ secrets.SSH_PRIVATE_KEY_BASE64 }}
          ssh-known-hosts: ${{ secrets.SSH_KNOWN_HOSTS }}
          server-host: ${{ env.SERVER_HOST }}

      - name: Production API liveness (HARD, probed via SSH)
        run: |
          set -euo pipefail
          # Probe localhost:3000 from the deploy box, not from this
          # runner. Cloudflare's WAF returns 403 to GitHub-hosted
          # runner IPs even when the service is fully up — see
          # commit 0179ef5 — so a runner-side probe was rejecting
          # every healthy production as "down".
          ssh -n root@${{ env.SERVER_HOST }} 'bash -s' <<'PROBE'
            set -euo pipefail
            # Colour-aware: under blue-green the active backend may be on green's
            # loopback port (3010), not blue's 3000. Read the state file the
            # deploy script writes; default to 3000 for the legacy/pre-adoption
            # single stack. Probe both as a fallback so a mid-migration box or a
            # missing state file still passes when either colour is healthy.
            active=blue
            [ -f /var/lib/kds-deploy/active-color-prod ] && \
              active="$(. /var/lib/kds-deploy/active-color-prod 2>/dev/null; echo "${ACTIVE_COLOR:-blue}")"
            [ "$active" = green ] && port=3010 || port=3000
            attempt=1
            while [ $attempt -le 3 ]; do
              if curl -fsS --max-time 10 "http://localhost:${port}/api/health" > /dev/null \
                 || curl -fsS --max-time 10 http://localhost:3000/api/health > /dev/null \
                 || curl -fsS --max-time 10 http://localhost:3010/api/health > /dev/null; then
                echo "Production /api/health (loopback, active=${active}) is healthy."
                exit 0
              fi
              echo "Attempt $attempt: backend not responding on localhost (tried ${port}/3000/3010), retrying in 10s..."
              attempt=$((attempt + 1))
              sleep 10
            done
            echo "::error::Production backend is unhealthy on its own host. Investigate before stacking a new release."
            exit 1
          PROBE

      - name: Verify required production secrets
        env:
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
          SUPERADMIN_JWT_SECRET: ${{ secrets.SUPERADMIN_JWT_SECRET }}
          SUPERADMIN_JWT_REFRESH_SECRET: ${{ secrets.SUPERADMIN_JWT_REFRESH_SECRET }}
          ENCRYPTION_MASTER_KEY: ${{ secrets.ENCRYPTION_MASTER_KEY }}
          INTEGRATION_KEY: ${{ secrets.INTEGRATION_KEY }}
          NETGSM_USERCODE: ${{ secrets.NETGSM_USERCODE }}
          NETGSM_PASSWORD: ${{ secrets.NETGSM_PASSWORD }}
          NETGSM_MSGHEADER: ${{ secrets.NETGSM_MSGHEADER }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          PAYTR_MERCHANT_ID: ${{ secrets.PAYTR_MERCHANT_ID }}
          PAYTR_MERCHANT_KEY: ${{ secrets.PAYTR_MERCHANT_KEY }}
          PAYTR_MERCHANT_SALT: ${{ secrets.PAYTR_MERCHANT_SALT }}
          EMAIL_HOST: ${{ secrets.EMAIL_HOST }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          DESKTOP_RELEASE_API_KEY: ${{ secrets.DESKTOP_RELEASE_API_KEY }}
          # Observability pair: listed in `recommended` below — every name the
          # loops dereference MUST be mapped here, or `${!name}` trips nounset
          # and kills the gate (exactly what blocked v3.2.94).
          METRICS_TOKEN: ${{ secrets.METRICS_TOKEN }}
          GRAFANA_ADMIN_PASSWORD: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
        run: |
          set -euo pipefail
          # backend env-validation.ts aborts boot on missing/short
          # secrets — the workflow used to discover that by watching
          # the container fail its health check. Catching it here
          # gives a clean "::error::" listing every missing secret.
          # (MARKETING_JWT_* / MARKETING_INGEST_TOKEN moved to the
          # kds-marketing service's own deploy pipeline.)
          required=(
            POSTGRES_PASSWORD
            JWT_SECRET JWT_REFRESH_SECRET
            SUPERADMIN_JWT_SECRET SUPERADMIN_JWT_REFRESH_SECRET
            ENCRYPTION_MASTER_KEY
            INTEGRATION_KEY
            REDIS_PASSWORD
            PAYTR_MERCHANT_ID PAYTR_MERCHANT_KEY PAYTR_MERCHANT_SALT
          )
          # Missing recommended secrets only degrade non-critical paths
          # (SMTP → no welcome emails; Google → only that login option).
          recommended=(
            EMAIL_HOST EMAIL_USER EMAIL_PASSWORD EMAIL_FROM
            GOOGLE_CLIENT_ID GOOGLE_CLIENT_SECRET
            DESKTOP_RELEASE_API_KEY
            NETGSM_USERCODE NETGSM_PASSWORD NETGSM_MSGHEADER
            METRICS_TOKEN GRAFANA_ADMIN_PASSWORD
          )

          missing=()
          for name in "${required[@]}"; do
            # ${!name:-} (not ${!name}) — an env-mapping gap must read as
            # "missing secret", not crash the whole gate under set -u.
            [ -z "${!name:-}" ] && missing+=("$name")
          done
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Refusing to deploy — required secrets unset or empty:"
            for n in "${missing[@]}"; do echo "::error::  - $n"; done
            exit 1
          fi

          degraded=()
          for name in "${recommended[@]}"; do
            [ -z "${!name:-}" ] && degraded+=("$name")
          done
          if [ ${#degraded[@]} -gt 0 ]; then
            echo "::warning::Deploying with degraded functionality:"
            for n in "${degraded[@]}"; do echo "::warning::  - $n"; done
          fi
          echo "All required secrets present (${#degraded[@]} recommended secrets missing)."

      - name: Setup SSH and probe production box
        uses: ./.github/actions/setup-ssh
        with:
          ssh-private-key-base64: ${{ secrets.SSH_PRIVATE_KEY_BASE64 }}
          ssh-known-hosts: ${{ secrets.SSH_KNOWN_HOSTS }}
          server-host: ${{ env.SERVER_HOST }}

  # Blocking quality gate: lint + typecheck + unit tests + contract drift
  # (see quality-gates.yml). No image is built from a red suite.
  quality:
    name: Quality gates
    uses: ./.github/workflows/quality-gates.yml

  # -------------------------------------------------------------------
  # Build images in parallel and push to GHCR. Production used to ship
  # tar.gz over scp — replaced by registry pull, both for symmetry with
  # staging and so the production box doesn't depend on a 1.5 GB scp
  # surviving every deploy.
  # -------------------------------------------------------------------
  build:
    name: Build & push to GHCR
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [pre-check, quality]
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version from tag
        id: version
        # Pipe workflow_dispatch input through env: instead of inlining
        # via ${{ }} into the shell. The ${{ }} expansion happens BEFORE
        # the regex validation runs, so a maintainer-supplied tag like
        # `v1.0.0"; rm -rf /; echo "` would have been evaluated by the
        # shell verbatim — splitting the line into a benign assignment
        # plus arbitrary commands plus a trailing echo, and the regex
        # check never gets a chance to reject it. Reading from $INPUT_TAG
        # treats the value as a literal string regardless of contents.
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            v="$INPUT_TAG"
          else
            v="${GITHUB_REF#refs/tags/}"
          fi
          [[ "$v" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]] || { echo "::error::Tag '$v' is not vX.Y.Z"; exit 1; }
          echo "VERSION=$v" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          target: production
          push: true
          tags: |
            ${{ env.GHCR_BASE }}/backend:${{ steps.version.outputs.VERSION }}
          cache-from: type=registry,ref=${{ env.GHCR_BASE }}/backend:buildcache
          cache-to:   type=registry,ref=${{ env.GHCR_BASE }}/backend:buildcache,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        env:
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          target: production
          push: true
          # Frontend assets bake the Sentry sourcemap upload; cache
          # poisoning between releases is a real risk, so we skip the
          # cache here and rely on Vite's own incremental build.
          no-cache: true
          pull: true
          tags: |
            ${{ env.GHCR_BASE }}/frontend:${{ steps.version.outputs.VERSION }}
          build-args: |
            VITE_API_URL=https://hummytummy.com/api
            VITE_API_BASE_URL=https://hummytummy.com
            VITE_SOCKET_URL=https://hummytummy.com
            VITE_WS_URL=wss://hummytummy.com
            VITE_GOOGLE_CLIENT_ID=${{ secrets.VITE_GOOGLE_CLIENT_ID }}
            VITE_APP_VERSION=${{ steps.version.outputs.VERSION }}
            VITE_BUILD_TIME=${{ github.event.head_commit.timestamp }}
            VITE_COMMIT_SHA=${{ github.sha }}
            SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }}
            SENTRY_ORG=${{ secrets.SENTRY_ORG }}
            SENTRY_PROJECT_FRONTEND=${{ secrets.SENTRY_PROJECT_FRONTEND }}

      - name: Build & push landing
        uses: docker/build-push-action@v5
        with:
          context: ./landing
          file: ./landing/Dockerfile
          push: true
          tags: |
            ${{ env.GHCR_BASE }}/landing:${{ steps.version.outputs.VERSION }}
          build-args: |
            NEXT_PUBLIC_API_URL=https://hummytummy.com/api
            NEXT_PUBLIC_SITE_URL=https://hummytummy.com
            SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }}
            SENTRY_ORG=${{ secrets.SENTRY_ORG }}
            SENTRY_PROJECT=${{ secrets.SENTRY_PROJECT_LANDING }}
          cache-from: type=registry,ref=${{ env.GHCR_BASE }}/landing:buildcache
          cache-to:   type=registry,ref=${{ env.GHCR_BASE }}/landing:buildcache,mode=max

      # Developer docs portal (Nextra). Standalone Next build; takes no
      # NEXT_PUBLIC_* / Sentry build-args (the Dockerfile declares none),
      # so this mirrors the landing step minus the args block. Served at
      # developer.hummytummy.com (host 3200 → container 3000).
      - name: Build & push developer
        uses: docker/build-push-action@v5
        with:
          context: ./developer
          file: ./developer/Dockerfile
          push: true
          tags: |
            ${{ env.GHCR_BASE }}/developer:${{ steps.version.outputs.VERSION }}
          cache-from: type=registry,ref=${{ env.GHCR_BASE }}/developer:buildcache
          cache-to:   type=registry,ref=${{ env.GHCR_BASE }}/developer:buildcache,mode=max

      # Help Center docs (Nextra). Served at help.hummytummy.com (host 3201 →
      # container 3000). Same shape as the developer step.
      - name: Build & push help
        uses: docker/build-push-action@v5
        with:
          context: ./help
          file: ./help/Dockerfile
          push: true
          tags: |
            ${{ env.GHCR_BASE }}/help:${{ steps.version.outputs.VERSION }}
          cache-from: type=registry,ref=${{ env.GHCR_BASE }}/help:buildcache
          cache-to:   type=registry,ref=${{ env.GHCR_BASE }}/help:buildcache,mode=max


  # -------------------------------------------------------------------
  # Render .env.production from secrets, ship it + the repo HEAD to the
  # server, and run scripts/deploy.sh. deploy.sh owns every step from
  # backup → migration doctor → image swap → :current promotion, and
  # auto-rolls back on any ERR.
  # -------------------------------------------------------------------
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: build
    environment: production
    steps:
      - name: Checkout (for env file rendering)
        uses: actions/checkout@v4

      - name: Setup SSH (no probe — gate already validated it)
        uses: ./.github/actions/setup-ssh
        with:
          ssh-private-key-base64: ${{ secrets.SSH_PRIVATE_KEY_BASE64 }}
          ssh-known-hosts: ${{ secrets.SSH_KNOWN_HOSTS }}
          server-host: ${{ env.SERVER_HOST }}
          probe: 'false'

      - name: Render .env.production
        env:
          VERSION: ${{ needs.build.outputs.version }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
          SUPERADMIN_JWT_SECRET: ${{ secrets.SUPERADMIN_JWT_SECRET }}
          SUPERADMIN_JWT_REFRESH_SECRET: ${{ secrets.SUPERADMIN_JWT_REFRESH_SECRET }}
          # kds-marketing service transport (Phase-5 split). Both optional:
          # core boots without them (referral resolution no-ops, event relay
          # disabled) until the marketing service is stood up.
          MARKETING_SERVICE_URL: ${{ vars.MARKETING_SERVICE_URL }}
          INTERNAL_SERVICE_TOKEN: ${{ secrets.INTERNAL_SERVICE_TOKEN }}
          ENCRYPTION_MASTER_KEY: ${{ secrets.ENCRYPTION_MASTER_KEY }}
          INTEGRATION_KEY: ${{ secrets.INTEGRATION_KEY }}
          NETGSM_USERCODE: ${{ secrets.NETGSM_USERCODE }}
          NETGSM_PASSWORD: ${{ secrets.NETGSM_PASSWORD }}
          NETGSM_MSGHEADER: ${{ secrets.NETGSM_MSGHEADER }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          PAYTR_MERCHANT_ID: ${{ secrets.PAYTR_MERCHANT_ID }}
          PAYTR_MERCHANT_KEY: ${{ secrets.PAYTR_MERCHANT_KEY }}
          PAYTR_MERCHANT_SALT: ${{ secrets.PAYTR_MERCHANT_SALT }}
          EMAIL_HOST: ${{ secrets.EMAIL_HOST }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          DESKTOP_RELEASE_API_KEY: ${{ secrets.DESKTOP_RELEASE_API_KEY }}
          # Observability: /api/metrics bearer + Grafana admin pw. Degrade-only —
          # monitoring stays inert if unset; the backend fails metrics scraping
          # closed in prod without METRICS_TOKEN.
          METRICS_TOKEN: ${{ secrets.METRICS_TOKEN }}
          GRAFANA_ADMIN_PASSWORD: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
          # Menu AI media — all optional; each feature stays inert until its key
          # is set (Anthropic vision menu-OCR, fal.ai photo+ingredients-video,
          # Meshy image-to-3D). No boot dependency.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FAL_KEY: ${{ secrets.FAL_KEY }}
          MESHY_API_KEY: ${{ secrets.MESHY_API_KEY }}
        run: |
          set -euo pipefail
          cat > .env.production.rendered <<ENV
          # Auto-generated by GitHub Actions for ${VERSION}.
          # backend env-validation.ts asserts uniqueness + minLength on
          # every secret below; missing one aborts container boot.

          TZ=Europe/Istanbul

          POSTGRES_DB=restaurant_pos_prod
          POSTGRES_USER=postgres
          POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
          DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/restaurant_pos_prod?connection_limit=25&pool_timeout=10
          REDIS_URL=redis://redis:6379/0

          JWT_SECRET=${JWT_SECRET}
          JWT_EXPIRES_IN=7d
          JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
          JWT_REFRESH_EXPIRES_IN=30d
          SUPERADMIN_JWT_SECRET=${SUPERADMIN_JWT_SECRET}
          SUPERADMIN_JWT_REFRESH_SECRET=${SUPERADMIN_JWT_REFRESH_SECRET}
          ENCRYPTION_MASTER_KEY=${ENCRYPTION_MASTER_KEY}
          # At-rest seed for per-tenant integration envelope keys (EnvKmsProvider
          # + integration-gateway, HKDF-sha256). Required in prod by both the
          # compose (${INTEGRATION_KEY:?}) and env-validation.ts. MUST be stable:
          # if prod already holds encrypted integration credentials, this has to
          # match the key they were encrypted under or they become undecryptable.
          INTEGRATION_KEY=${INTEGRATION_KEY}

          MARKETING_SERVICE_URL=${MARKETING_SERVICE_URL}
          INTERNAL_SERVICE_TOKEN=${INTERNAL_SERVICE_TOKEN}

          # Staging origin deliberately NOT trusted by prod — staging runs its own
          # backend with its own session secrets, so it never needs to call the
          # prod API. (Dropped https://staging.hummytummy.com to remove the
          # cross-environment request path.)
          CORS_ORIGIN=https://hummytummy.com,https://marketing.hummytummy.com,https://landing.hummytummy.com,http://tauri.localhost,tauri://localhost,https://tauri.localhost
          FRONTEND_URL=https://hummytummy.com

          PAYTR_MERCHANT_ID=${PAYTR_MERCHANT_ID}
          PAYTR_MERCHANT_KEY=${PAYTR_MERCHANT_KEY}
          PAYTR_MERCHANT_SALT=${PAYTR_MERCHANT_SALT}
          PAYTR_BASE_URL=https://www.paytr.com
          PAYTR_TEST_MODE=0
          PAYTR_OK_URL=https://hummytummy.com/app/subscription/success
          PAYTR_FAIL_URL=https://hummytummy.com/app/subscription/fail
          BACKEND_URL=https://hummytummy.com

          EMAIL_HOST=${EMAIL_HOST}
          EMAIL_PORT=587
          EMAIL_SECURE=false
          EMAIL_USER=${EMAIL_USER}
          EMAIL_PASSWORD=${EMAIL_PASSWORD}
          EMAIL_FROM=${EMAIL_FROM}
          ADMIN_EMAIL=contact@hummytummy.com

          # Observability: Prometheus bearer for /api/metrics + Grafana admin pw.
          # Both degrade-only — the monitoring stack (up.sh) stays inert until
          # GRAFANA_ADMIN_PASSWORD is set as a repo secret.
          METRICS_TOKEN=${METRICS_TOKEN}
          GRAFANA_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}

          # Customer OTP SMS (NetGSM). PLACEHOLDER: creds not ready, so SMS is
          # bypassed for launch — ALLOW_MOCK_SMS_IN_PROD=true lets the backend
          # boot with OTP delivery mocked/silent. Once the NETGSM_* repo secrets
          # are set, the provider auto-activates (mockMode off) and real SMS
          # flows on the next deploy — no code change; ALLOW_MOCK becomes a no-op.
          ALLOW_MOCK_SMS_IN_PROD=true
          SMS_PROVIDER=netgsm
          NETGSM_USERCODE=${NETGSM_USERCODE}
          NETGSM_PASSWORD=${NETGSM_PASSWORD}
          NETGSM_MSGHEADER=${NETGSM_MSGHEADER}

          DEFAULT_TRIAL_DAYS=14
          TRIAL_REMINDER_DAYS=3

          GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
          GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}

          VITE_API_URL=https://hummytummy.com/api
          VITE_API_BASE_URL=https://hummytummy.com
          VITE_SOCKET_URL=https://hummytummy.com
          VITE_WS_URL=wss://hummytummy.com
          VITE_GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}

          DESKTOP_RELEASE_API_KEY=${DESKTOP_RELEASE_API_KEY}
          REDIS_PASSWORD=${REDIS_PASSWORD}

          # Menu AI media generation. Each is read by its service's isConfigured()
          # gate — empty ⇒ that feature stays inert (tab/panel hidden, 503).
          ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
          FAL_KEY=${FAL_KEY}
          MESHY_API_KEY=${MESHY_API_KEY}
          ENV
          # scp will rename it on landing; keep the local name verbose
          # so accidental commits get caught by .gitignore patterns.

      - name: Ship env file to server
        # Atomic write: scp lands the file at a sibling .new path, then
        # `mv` (a POSIX rename on the same filesystem) swaps it into
        # place in a single inode-level operation. If scp dies mid-
        # transfer on a network blip, the existing .env.production
        # stays intact — the half-written file is at .new and either
        # the next deploy retries cleanly or this step exits non-zero.
        # Previously `scp` wrote directly to .env.production and a
        # truncated transfer would have left docker-compose reading a
        # malformed env on the next swap.
        run: |
          set -euo pipefail
          scp -o ServerAliveInterval=15 \
            .env.production.rendered \
            root@${{ env.SERVER_HOST }}:/root/kds/.env.production.new
          ssh -o ServerAliveInterval=15 root@${{ env.SERVER_HOST }} \
            'mv /root/kds/.env.production.new /root/kds/.env.production'

      - name: Run deploy.sh on the server
        id: deploy
        env:
          VERSION: ${{ needs.build.outputs.version }}
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Mapped through env: (NOT inlined into the remote root shell string)
          # so an attacker-influenceable variable value can never break out of
          # the quoting and run as root@prod — same hardening the tag step uses.
          PROD_BLUEGREEN: ${{ vars.PROD_BLUEGREEN }}
        run: |
          set -euo pipefail
          # Decide the deploy command HERE, on the runner, from the env var —
          # the value never reaches the remote shell parser.
          if [ "${PROD_BLUEGREEN:-}" = 'true' ]; then
            DEPLOY_CMD='./scripts/deploy-blue-green.sh prod'
          else
            DEPLOY_CMD='./scripts/deploy.sh prod'
          fi
          # Single SSH session, set -euo pipefail at the top so any
          # failed line aborts immediately. The previous workflow used
          # a heredoc without set -e and silently continued on
          # `git checkout` failure → wrong version deployed.
          ssh -o ServerAliveInterval=15 -o ServerAliveCountMax=4 \
            root@${{ env.SERVER_HOST }} "
              set -euo pipefail
              cd /root/kds
              # See test-deploy.yml for the rationale — stash any
              # uncommitted state files left by the legacy deployer.
              git stash --include-untracked --quiet || true
              # --force on --tags overwrites any local tag the deploy
              # box rewrote during earlier manual debugging. Without
              # --force, fetch dies with 'would clobber existing tag'
              # and the whole deploy is aborted.
              git fetch --all --tags --force
              git reset --hard ${VERSION}
              export GHCR_USER='${GHCR_USER}'
              export GHCR_TOKEN='${GHCR_TOKEN}'
              # Zero-downtime blue-green once vars.PROD_BLUEGREEN=true — set that
              # repo variable ONLY after the one-time server prep in
              # docs/deploy/blue-green-runbook.md §2-4. Until then this defaults
              # to the legacy in-place deploy, so merging changes nothing.
              ${DEPLOY_CMD} ${VERSION}
            "

      # Post-deploy public probe lives in scripts/deploy.sh
      # (verify_and_promote). Cloudflare's WAF returns 403 to
      # GitHub-hosted runner IPs even when the service is fully up,
      # so a workflow-side probe was reliably failing healthy
      # deploys and triggering a rollback. deploy.sh runs the same
      # probe from the deploy box itself, which Cloudflare lets
      # through. One source of truth, no IP-rule conflicts.

      - name: SSL cert expiry guard
        run: |
          set -euo pipefail
          host=hummytummy.com
          end=$(echo | openssl s_client -servername "$host" -connect "$host:443" 2>/dev/null \
                | openssl x509 -noout -enddate | cut -d= -f2)
          end_ts=$(date -d "$end" +%s)
          now_ts=$(date +%s)
          days=$(( (end_ts - now_ts) / 86400 ))
          echo "SSL expires in $days days ($end)"
          if [ "$days" -le 3 ]; then
            echo "::error::SSL cert expires in $days days — renew now"
            exit 1
          elif [ "$days" -le 14 ]; then
            echo "::warning::SSL cert expires in $days days — renew this week"
          fi

      - name: Performance smoke (warning only)
        continue-on-error: true
        run: |
          start=$(date +%s%3N)
          curl -fsS -o /dev/null --max-time 10 https://hummytummy.com/api/health || exit 0
          end=$(date +%s%3N)
          rt=$((end - start))
          echo "API response time: ${rt}ms"
          if [ "$rt" -gt 5000 ]; then
            echo "::warning::API response time ${rt}ms — investigate if persistent"
          fi

      - name: Disk cleanup
        if: success()
        run: |
          ssh -o ServerAliveInterval=15 root@${{ env.SERVER_HOST }} '
            set -euo pipefail
            # Keep images touched in the last 7 days (covers rollback
            # window). Anything older gets reaped.
            docker image prune -af --filter "until=168h" || true
          '

      - name: Rollback on failure
        # ONLY when the DEPLOY step itself failed — not for a later step (SSL
        # guard / perf smoke), which must never flip prod traffic. Scoped to
        # steps.deploy so an unrelated post-deploy failure can't trigger a
        # traffic change.
        if: failure() && steps.deploy.conclusion == 'failure'
        env:
          VERSION: ${{ needs.build.outputs.version }}
          PROD_BLUEGREEN: ${{ vars.PROD_BLUEGREEN }}
        run: |
          set -euo pipefail
          if [ "${PROD_BLUEGREEN:-}" = 'true' ]; then
            # The blue-green script ALREADY self-handles failure: a pre-flip
            # failure tears down the un-promoted colour (active untouched); a
            # post-flip failure reverts nginx to the active colour AND rewrites
            # state. Re-invoking `rollback` here would boot the OTHER colour and
            # flip onto it — turning a safely-contained failure into an outage.
            # So we only LOG status; a real rollback is a deliberate manual call.
            ssh -o ServerAliveInterval=15 root@${{ env.SERVER_HOST }} '
              set -euo pipefail
              cd /root/kds
              echo "::warning::blue-green deploy failed; script self-reverted. Current status:"
              ./scripts/deploy-blue-green.sh prod status || true
            '
          else
            # Legacy path: deploy.sh owns its own rollback. Re-sync first — if the
            # deploy step crashed before its own reset, the script may not be on
            # disk at the version we roll back to.
            ssh -o ServerAliveInterval=15 root@${{ env.SERVER_HOST }} "
              set -euo pipefail
              cd /root/kds
              git stash --include-untracked --quiet || true
              git fetch --all --tags --force
              git reset --hard ${VERSION}
              ./scripts/deploy.sh prod-rollback
            "
          fi

      - name: Cleanup workspace
        if: always()
        run: rm -f .env.production.rendered

  # -------------------------------------------------------------------
  # Best-effort post-deploy bookkeeping. None of these failing should
  # roll back the deploy (the service is already live and healthy by
  # the time we get here); they're decorations on a green deploy.
  # -------------------------------------------------------------------
  bookkeep:
    name: Sentry release + GitHub release
    runs-on: ubuntu-latest
    needs: deploy
    if: success()
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        # Same env: pipe + regex validation as the build-job version
        # resolver. Without it a malicious workflow_dispatch tag could
        # inject shell when written to $GITHUB_OUTPUT.
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            v="$INPUT_TAG"
          else
            v="${GITHUB_REF#refs/tags/}"
          fi
          [[ "$v" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]] || { echo "::error::Tag '$v' is not vX.Y.Z"; exit 1; }
          echo "VERSION=$v" >> "$GITHUB_OUTPUT"

      - name: Sentry release
        continue-on-error: true
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
        run: |
          set -euo pipefail
          curl -sL https://sentry.io/get-cli/ | bash
          VERSION="${{ steps.version.outputs.VERSION }}"
          for PROJECT in \
              "${{ secrets.SENTRY_PROJECT_BACKEND }}" \
              "${{ secrets.SENTRY_PROJECT_FRONTEND }}" \
              "${{ secrets.SENTRY_PROJECT_LANDING }}"; do
            [ -z "$PROJECT" ] && continue
            sentry-cli releases new      "${PROJECT}@${VERSION}" --project "${PROJECT}" || true
            sentry-cli releases set-commits "${PROJECT}@${VERSION}" --auto --project "${PROJECT}" || true
            sentry-cli releases deploys  "${PROJECT}@${VERSION}" new --env production --project "${PROJECT}" || true
            sentry-cli releases finalize "${PROJECT}@${VERSION}" --project "${PROJECT}" || true
          done

      - name: GitHub Release
        continue-on-error: true
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: Release ${{ steps.version.outputs.VERSION }}
          body: |
            ## Release ${{ steps.version.outputs.VERSION }}

            Deployed at: ${{ github.event.head_commit.timestamp }}
            Commit: ${{ github.sha }}
            URL: https://hummytummy.com

            Deploy ran scripts/deploy.sh which executed:
            - DB backup (verified)
            - Migration doctor
            - Image swap with rollback-on-error
            - Public smoke probe

            See commit history for details.
          draft: false
          prerelease: false
