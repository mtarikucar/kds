name: Test Environment Deployment

on:
  push:
    branches:
      - test
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual deployment'
        required: false
        default: 'Manual deployment'

permissions:
  contents: read
  packages: write   # GHCR push

# Staging is allowed to throw away in-flight work for the latest commit
# — the inverse of production, where every release ships in order.
concurrency:
  group: staging-deploy
  cancel-in-progress: true

env:
  NODE_VERSION: '18.x'
  SERVER_HOST: '38.242.233.166'
  GHCR_BASE: 'ghcr.io/mtarikucar/kds'

jobs:
  pre-check:
    name: Pre-flight gate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout (for composite action)
        uses: actions/checkout@v4

      - name: Verify required secrets
        env:
          # Staging-specific secrets (distinct from prod) — see the Render
          # .env.test step below for the full rationale. A staging credential is
          # never valid against prod.
          POSTGRES_PASSWORD: ${{ secrets.STAGING_POSTGRES_PASSWORD }}
          JWT_SECRET: ${{ secrets.STAGING_JWT_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.STAGING_JWT_REFRESH_SECRET }}
          SUPERADMIN_JWT_SECRET: ${{ secrets.STAGING_SUPERADMIN_JWT_SECRET }}
          SUPERADMIN_JWT_REFRESH_SECRET: ${{ secrets.STAGING_SUPERADMIN_JWT_REFRESH_SECRET }}
          ENCRYPTION_MASTER_KEY: ${{ secrets.STAGING_ENCRYPTION_MASTER_KEY }}
        run: |
          set -euo pipefail
          missing=()
          for n in POSTGRES_PASSWORD JWT_SECRET JWT_REFRESH_SECRET \
                   SUPERADMIN_JWT_SECRET SUPERADMIN_JWT_REFRESH_SECRET \
                   ENCRYPTION_MASTER_KEY; do
            [ -z "${!n}" ] && missing+=("$n")
          done
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing required secrets:"
            for n in "${missing[@]}"; do echo "::error::  - $n"; done
            exit 1
          fi

      - name: Setup SSH (probe)
        uses: ./.github/actions/setup-ssh
        with:
          ssh-private-key-base64: ${{ secrets.SSH_PRIVATE_KEY_BASE64 }}
          ssh-known-hosts: ${{ secrets.SSH_KNOWN_HOSTS }}
          server-host: ${{ env.SERVER_HOST }}

  quality:
    name: Quality gates
    uses: ./.github/workflows/quality-gates.yml

  build:
    name: Build & push staging images
    runs-on: ubuntu-latest
    needs: [pre-check, quality]
    timeout-minutes: 30
    outputs:
      commit_sha: ${{ steps.commit.outputs.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: test
          fetch-depth: 0

      - name: Compute commit SHA
        id: commit
        run: echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          target: production
          push: true
          tags: ${{ env.GHCR_BASE }}/backend-staging:${{ steps.commit.outputs.sha }}
          cache-from: type=registry,ref=${{ env.GHCR_BASE }}/backend-staging:buildcache
          cache-to:   type=registry,ref=${{ env.GHCR_BASE }}/backend-staging:buildcache,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          target: production
          push: true
          no-cache: true
          pull: true
          tags: ${{ env.GHCR_BASE }}/frontend-staging:${{ steps.commit.outputs.sha }}
          build-args: |
            VITE_API_URL=https://staging.hummytummy.com/api
            VITE_API_BASE_URL=https://staging.hummytummy.com
            VITE_SOCKET_URL=https://staging.hummytummy.com
            VITE_WS_URL=wss://staging.hummytummy.com
            # Google sign-in is OFF on staging until it has its OWN OAuth client
            # (never the prod client). Empty here → SocialLoginButtons renders
            # nothing. Set STAGING_GOOGLE_CLIENT_ID to enable an isolated client.
            VITE_GOOGLE_CLIENT_ID=${{ secrets.STAGING_GOOGLE_CLIENT_ID }}
            VITE_APP_VERSION=${{ steps.commit.outputs.sha }}
            VITE_BUILD_TIME=${{ github.event.head_commit.timestamp }}
            VITE_COMMIT_SHA=${{ github.sha }}

      - name: Build & push landing
        uses: docker/build-push-action@v5
        with:
          context: ./landing
          file: ./landing/Dockerfile
          push: true
          tags: ${{ env.GHCR_BASE }}/landing-staging:${{ steps.commit.outputs.sha }}
          build-args: |
            NEXT_PUBLIC_API_URL=https://staging.hummytummy.com/api
            NEXT_PUBLIC_SITE_URL=https://staging.hummytummy.com
          cache-from: type=registry,ref=${{ env.GHCR_BASE }}/landing-staging:buildcache
          cache-to:   type=registry,ref=${{ env.GHCR_BASE }}/landing-staging:buildcache,mode=max

      # Developer docs portal (Nextra) — staging image. Standalone Next build
      # with no NEXT_PUBLIC_* / Sentry build-args (the Dockerfile declares
      # none), so this mirrors the landing-staging step minus the args block.
      - name: Build & push developer
        uses: docker/build-push-action@v5
        with:
          context: ./developer
          file: ./developer/Dockerfile
          push: true
          tags: ${{ env.GHCR_BASE }}/developer-staging:${{ steps.commit.outputs.sha }}
          cache-from: type=registry,ref=${{ env.GHCR_BASE }}/developer-staging:buildcache
          cache-to:   type=registry,ref=${{ env.GHCR_BASE }}/developer-staging:buildcache,mode=max

      - name: Build & push help
        uses: docker/build-push-action@v5
        with:
          context: ./help
          file: ./help/Dockerfile
          push: true
          tags: ${{ env.GHCR_BASE }}/help-staging:${{ steps.commit.outputs.sha }}
          cache-from: type=registry,ref=${{ env.GHCR_BASE }}/help-staging:buildcache
          cache-to:   type=registry,ref=${{ env.GHCR_BASE }}/help-staging:buildcache,mode=max


  deploy:
    name: Deploy staging
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 15
    steps:
      - name: Checkout (for env render)
        uses: actions/checkout@v4
        with:
          ref: test

      - name: Setup SSH (no re-probe)
        uses: ./.github/actions/setup-ssh
        with:
          ssh-private-key-base64: ${{ secrets.SSH_PRIVATE_KEY_BASE64 }}
          ssh-known-hosts: ${{ secrets.SSH_KNOWN_HOSTS }}
          server-host: ${{ env.SERVER_HOST }}
          probe: 'false'

      - name: Render .env.test
        env:
          # Staging-specific secrets — DISTINCT from prod across the board so NO
          # staging credential (DB password, session JWT, encryption key, service
          # token) is ever valid against prod, and vice-versa. Stored as repo
          # secrets STAGING_*. The DB password is reconciled with the running
          # staging Postgres role by scripts/deploy.sh `sync_db_password`
          # (staging-only) because a persistent volume ignores POSTGRES_PASSWORD
          # after first init.
          POSTGRES_PASSWORD: ${{ secrets.STAGING_POSTGRES_PASSWORD }}
          JWT_SECRET: ${{ secrets.STAGING_JWT_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.STAGING_JWT_REFRESH_SECRET }}
          SUPERADMIN_JWT_SECRET: ${{ secrets.STAGING_SUPERADMIN_JWT_SECRET }}
          SUPERADMIN_JWT_REFRESH_SECRET: ${{ secrets.STAGING_SUPERADMIN_JWT_REFRESH_SECRET }}
          # kds-marketing transport. Distinct staging token so a staging bug can
          # never authenticate writes into the PROD marketing service.
          MARKETING_SERVICE_URL: ${{ vars.MARKETING_SERVICE_URL }}
          INTERNAL_SERVICE_TOKEN: ${{ secrets.STAGING_INTERNAL_SERVICE_TOKEN }}
          ENCRYPTION_MASTER_KEY: ${{ secrets.STAGING_ENCRYPTION_MASTER_KEY }}
          # PayTR: prefer a dedicated staging TEST merchant when set, else fall
          # back to the shared merchant. Staging is always PAYTR_TEST_MODE=1 (no
          # real charges); a separate test merchant additionally isolates the
          # webhook (its own panel notify URL). Until then the shared merchant is
          # used (test mode → no money risk).
          PAYTR_MERCHANT_ID: ${{ secrets.STAGING_PAYTR_MERCHANT_ID || secrets.PAYTR_MERCHANT_ID }}
          PAYTR_MERCHANT_KEY: ${{ secrets.STAGING_PAYTR_MERCHANT_KEY || secrets.PAYTR_MERCHANT_KEY }}
          PAYTR_MERCHANT_SALT: ${{ secrets.STAGING_PAYTR_MERCHANT_SALT || secrets.PAYTR_MERCHANT_SALT }}
          # NOTE: EMAIL_HOST/USER/PASSWORD deliberately NOT rendered on staging →
          # EmailService runs in mock mode (logs, never sends) so staging testing
          # can't deliver real mail to real recipients via prod SMTP.
          # Google: staging uses its OWN client only (never prod's). Empty unless
          # STAGING_GOOGLE_* is set → backend rejects Google sign-in on staging.
          GOOGLE_CLIENT_ID: ${{ secrets.STAGING_GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.STAGING_GOOGLE_CLIENT_SECRET }}
          DESKTOP_RELEASE_API_KEY: ${{ secrets.DESKTOP_RELEASE_API_KEY }}
        run: |
          set -euo pipefail
          cat > .env.test.rendered <<ENV
          TZ=Europe/Istanbul

          POSTGRES_DB=restaurant_pos_staging
          POSTGRES_USER=postgres
          POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
          DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/restaurant_pos_staging?connection_limit=25&pool_timeout=10
          REDIS_URL=redis://redis:6379/0

          JWT_SECRET=${JWT_SECRET}
          JWT_EXPIRES_IN=7d
          JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
          JWT_REFRESH_EXPIRES_IN=30d
          SUPERADMIN_JWT_SECRET=${SUPERADMIN_JWT_SECRET}
          SUPERADMIN_JWT_REFRESH_SECRET=${SUPERADMIN_JWT_REFRESH_SECRET}
          MARKETING_SERVICE_URL=${MARKETING_SERVICE_URL}
          INTERNAL_SERVICE_TOKEN=${INTERNAL_SERVICE_TOKEN}
          ENCRYPTION_MASTER_KEY=${ENCRYPTION_MASTER_KEY}

          CORS_ORIGIN=https://staging.hummytummy.com,http://tauri.localhost,tauri://localhost,https://tauri.localhost
          FRONTEND_URL=https://staging.hummytummy.com

          PAYTR_MERCHANT_ID=${PAYTR_MERCHANT_ID}
          PAYTR_MERCHANT_KEY=${PAYTR_MERCHANT_KEY}
          PAYTR_MERCHANT_SALT=${PAYTR_MERCHANT_SALT}
          PAYTR_BASE_URL=https://www.paytr.com
          PAYTR_TEST_MODE=1
          PAYTR_OK_URL=https://staging.hummytummy.com/app/subscription/success
          PAYTR_FAIL_URL=https://staging.hummytummy.com/app/subscription/fail
          BACKEND_URL=https://staging.hummytummy.com

          # Email intentionally unconfigured on staging → EmailService mock mode
          # (logs instead of sending) so staging never delivers real mail.
          ADMIN_EMAIL=contact@hummytummy.com

          DEFAULT_TRIAL_DAYS=14
          TRIAL_REMINDER_DAYS=3

          GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
          GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}

          VITE_API_URL=https://staging.hummytummy.com/api
          VITE_API_BASE_URL=https://staging.hummytummy.com
          VITE_SOCKET_URL=https://staging.hummytummy.com
          VITE_WS_URL=wss://staging.hummytummy.com
          VITE_GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}

          DESKTOP_RELEASE_API_KEY=${DESKTOP_RELEASE_API_KEY}
          ENV

      - name: Ship env file to server
        # Atomic write: scp → .new sibling, then `mv` (a POSIX rename
        # on the same filesystem) swaps it in. A network blip during
        # scp leaves the existing .env.test intact; the half-written
        # file lands at .new and either retries or surfaces as a
        # non-zero exit. Without this, scp's in-place truncate
        # could leave docker-compose reading a malformed env at the
        # next container swap.
        run: |
          set -euo pipefail
          scp -o ServerAliveInterval=15 \
            .env.test.rendered \
            root@${{ env.SERVER_HOST }}:/root/kds/.env.test.new
          ssh -o ServerAliveInterval=15 root@${{ env.SERVER_HOST }} \
            'mv /root/kds/.env.test.new /root/kds/.env.test'

      - name: Run deploy.sh staging on the server
        env:
          SHA: ${{ needs.build.outputs.commit_sha }}
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          ssh -o ServerAliveInterval=15 -o ServerAliveCountMax=4 \
            root@${{ env.SERVER_HOST }} "
              set -euo pipefail
              cd /root/kds
              # The legacy deployer left .last-deployment-images and
              # other ephemera in the working tree. Stash anything
              # uncommitted so `git reset --hard` below doesn't refuse
              # to clobber it. The state we actually care about lives
              # outside the repo (/var/lib/kds-deploy).
              git stash --include-untracked --quiet || true
              git fetch origin test
              git reset --hard origin/test
              export GHCR_USER='${GHCR_USER}'
              export GHCR_TOKEN='${GHCR_TOKEN}'
              ./scripts/deploy.sh staging ${SHA}
            "

      # The post-deploy public probe lives inside scripts/deploy.sh
      # (verify_and_promote step), which runs on the deploy box itself.
      # Cloudflare lets the server's own IP through but blocks
      # GitHub-hosted runner IPs with a 403 WAF rule, so duplicating
      # the probe at the workflow layer reliably reports a healthy
      # deploy as failed. Trust deploy.sh's verdict.

      - name: Rollback on failure
        if: failure()
        run: |
          # Rollback re-syncs the worktree before calling deploy.sh —
          # if the deploy step crashed before its own reset succeeded,
          # the rollback script may not exist on disk yet.
          ssh root@${{ env.SERVER_HOST }} '
            set -euo pipefail
            cd /root/kds
            git stash --include-untracked --quiet || true
            git fetch origin test
            git reset --hard origin/test
            ./scripts/deploy.sh staging-rollback
          '

      - name: Cleanup workspace
        if: always()
        run: rm -f .env.test.rendered
