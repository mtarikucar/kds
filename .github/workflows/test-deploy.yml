name: Test Environment Deployment

on:
  push:
    branches:
      - test
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual deployment'
        required: false
        default: 'Manual deployment'

permissions:
  contents: read
  packages: write   # GHCR push

# Staging is allowed to throw away in-flight work for the latest commit
# — the inverse of production, where every release ships in order.
concurrency:
  group: staging-deploy
  cancel-in-progress: true

env:
  NODE_VERSION: '18.x'
  SERVER_HOST: '38.242.233.166'
  GHCR_BASE: 'ghcr.io/mtarikucar/kds'

jobs:
  pre-check:
    name: Pre-flight gate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout (for composite action)
        uses: actions/checkout@v4

      - name: Verify required secrets
        env:
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
          SUPERADMIN_JWT_SECRET: ${{ secrets.SUPERADMIN_JWT_SECRET }}
          SUPERADMIN_JWT_REFRESH_SECRET: ${{ secrets.SUPERADMIN_JWT_REFRESH_SECRET }}
          MARKETING_JWT_SECRET: ${{ secrets.MARKETING_JWT_SECRET }}
          MARKETING_JWT_REFRESH_SECRET: ${{ secrets.MARKETING_JWT_REFRESH_SECRET }}
          MARKETING_INGEST_TOKEN: ${{ secrets.MARKETING_INGEST_TOKEN }}
          ENCRYPTION_MASTER_KEY: ${{ secrets.ENCRYPTION_MASTER_KEY }}
        run: |
          set -euo pipefail
          missing=()
          for n in POSTGRES_PASSWORD JWT_SECRET JWT_REFRESH_SECRET \
                   SUPERADMIN_JWT_SECRET SUPERADMIN_JWT_REFRESH_SECRET \
                   MARKETING_JWT_SECRET MARKETING_JWT_REFRESH_SECRET \
                   MARKETING_INGEST_TOKEN ENCRYPTION_MASTER_KEY; do
            [ -z "${!n}" ] && missing+=("$n")
          done
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing required secrets:"
            for n in "${missing[@]}"; do echo "::error::  - $n"; done
            exit 1
          fi

      - name: Setup SSH (probe)
        uses: ./.github/actions/setup-ssh
        with:
          ssh-private-key-base64: ${{ secrets.SSH_PRIVATE_KEY_BASE64 }}
          ssh-known-hosts: ${{ secrets.SSH_KNOWN_HOSTS }}
          server-host: ${{ env.SERVER_HOST }}

  build:
    name: Build & push staging images
    runs-on: ubuntu-latest
    needs: pre-check
    timeout-minutes: 30
    outputs:
      commit_sha: ${{ steps.commit.outputs.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: test
          fetch-depth: 0

      - name: Compute commit SHA
        id: commit
        run: echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          target: production
          push: true
          tags: ${{ env.GHCR_BASE }}/backend-staging:${{ steps.commit.outputs.sha }}
          cache-from: type=registry,ref=${{ env.GHCR_BASE }}/backend-staging:buildcache
          cache-to:   type=registry,ref=${{ env.GHCR_BASE }}/backend-staging:buildcache,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          target: production
          push: true
          no-cache: true
          pull: true
          tags: ${{ env.GHCR_BASE }}/frontend-staging:${{ steps.commit.outputs.sha }}
          build-args: |
            VITE_API_URL=https://staging.hummytummy.com/api
            VITE_API_BASE_URL=https://staging.hummytummy.com
            VITE_SOCKET_URL=https://staging.hummytummy.com
            VITE_WS_URL=wss://staging.hummytummy.com
            VITE_GOOGLE_CLIENT_ID=${{ secrets.VITE_GOOGLE_CLIENT_ID }}
            VITE_APP_VERSION=${{ steps.commit.outputs.sha }}
            VITE_BUILD_TIME=${{ github.event.head_commit.timestamp }}
            VITE_COMMIT_SHA=${{ github.sha }}

      - name: Build & push landing
        uses: docker/build-push-action@v5
        with:
          context: ./landing
          file: ./landing/Dockerfile
          push: true
          tags: ${{ env.GHCR_BASE }}/landing-staging:${{ steps.commit.outputs.sha }}
          build-args: |
            NEXT_PUBLIC_API_URL=https://staging.hummytummy.com/api
            NEXT_PUBLIC_SITE_URL=https://staging.hummytummy.com
          cache-from: type=registry,ref=${{ env.GHCR_BASE }}/landing-staging:buildcache
          cache-to:   type=registry,ref=${{ env.GHCR_BASE }}/landing-staging:buildcache,mode=max

      - name: Build & push marketing
        uses: docker/build-push-action@v5
        with:
          context: ./marketing
          file: ./marketing/Dockerfile
          target: production
          push: true
          tags: ${{ env.GHCR_BASE }}/marketing-staging:${{ steps.commit.outputs.sha }}
          build-args: |
            VITE_API_URL=https://staging.hummytummy.com/api
            VITE_API_BASE_URL=https://staging.hummytummy.com
          cache-from: type=registry,ref=${{ env.GHCR_BASE }}/marketing-staging:buildcache
          cache-to:   type=registry,ref=${{ env.GHCR_BASE }}/marketing-staging:buildcache,mode=max

  deploy:
    name: Deploy staging
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 15
    steps:
      - name: Checkout (for env render)
        uses: actions/checkout@v4
        with:
          ref: test

      - name: Setup SSH (no re-probe)
        uses: ./.github/actions/setup-ssh
        with:
          ssh-private-key-base64: ${{ secrets.SSH_PRIVATE_KEY_BASE64 }}
          ssh-known-hosts: ${{ secrets.SSH_KNOWN_HOSTS }}
          server-host: ${{ env.SERVER_HOST }}
          probe: 'false'

      - name: Render .env.test
        env:
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
          SUPERADMIN_JWT_SECRET: ${{ secrets.SUPERADMIN_JWT_SECRET }}
          SUPERADMIN_JWT_REFRESH_SECRET: ${{ secrets.SUPERADMIN_JWT_REFRESH_SECRET }}
          MARKETING_JWT_SECRET: ${{ secrets.MARKETING_JWT_SECRET }}
          MARKETING_JWT_REFRESH_SECRET: ${{ secrets.MARKETING_JWT_REFRESH_SECRET }}
          MARKETING_INGEST_TOKEN: ${{ secrets.MARKETING_INGEST_TOKEN }}
          ENCRYPTION_MASTER_KEY: ${{ secrets.ENCRYPTION_MASTER_KEY }}
          PAYTR_MERCHANT_ID: ${{ secrets.PAYTR_MERCHANT_ID }}
          PAYTR_MERCHANT_KEY: ${{ secrets.PAYTR_MERCHANT_KEY }}
          PAYTR_MERCHANT_SALT: ${{ secrets.PAYTR_MERCHANT_SALT }}
          EMAIL_HOST: ${{ secrets.EMAIL_HOST }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          DESKTOP_RELEASE_API_KEY: ${{ secrets.DESKTOP_RELEASE_API_KEY }}
        run: |
          set -euo pipefail
          cat > .env.test.rendered <<ENV
          TZ=Europe/Istanbul

          POSTGRES_DB=restaurant_pos_staging
          POSTGRES_USER=postgres
          POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
          DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/restaurant_pos_staging?connection_limit=25&pool_timeout=10
          REDIS_URL=redis://redis:6379/0

          JWT_SECRET=${JWT_SECRET}
          JWT_EXPIRES_IN=7d
          JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
          JWT_REFRESH_EXPIRES_IN=30d
          SUPERADMIN_JWT_SECRET=${SUPERADMIN_JWT_SECRET}
          SUPERADMIN_JWT_REFRESH_SECRET=${SUPERADMIN_JWT_REFRESH_SECRET}
          MARKETING_JWT_SECRET=${MARKETING_JWT_SECRET}
          MARKETING_JWT_REFRESH_SECRET=${MARKETING_JWT_REFRESH_SECRET}
          MARKETING_INGEST_TOKEN=${MARKETING_INGEST_TOKEN}
          ENCRYPTION_MASTER_KEY=${ENCRYPTION_MASTER_KEY}

          CORS_ORIGIN=https://staging.hummytummy.com,http://tauri.localhost,tauri://localhost,https://tauri.localhost
          FRONTEND_URL=https://staging.hummytummy.com

          PAYTR_MERCHANT_ID=${PAYTR_MERCHANT_ID}
          PAYTR_MERCHANT_KEY=${PAYTR_MERCHANT_KEY}
          PAYTR_MERCHANT_SALT=${PAYTR_MERCHANT_SALT}
          PAYTR_BASE_URL=https://www.paytr.com
          PAYTR_TEST_MODE=1
          BACKEND_URL=https://staging.hummytummy.com

          EMAIL_HOST=${EMAIL_HOST}
          EMAIL_PORT=587
          EMAIL_SECURE=false
          EMAIL_USER=${EMAIL_USER}
          EMAIL_PASSWORD=${EMAIL_PASSWORD}
          EMAIL_FROM=${EMAIL_FROM}
          ADMIN_EMAIL=contact@hummytummy.com

          DEFAULT_TRIAL_DAYS=14
          TRIAL_REMINDER_DAYS=3

          GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
          GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}

          VITE_API_URL=https://staging.hummytummy.com/api
          VITE_API_BASE_URL=https://staging.hummytummy.com
          VITE_SOCKET_URL=https://staging.hummytummy.com
          VITE_WS_URL=wss://staging.hummytummy.com
          VITE_GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}

          DESKTOP_RELEASE_API_KEY=${DESKTOP_RELEASE_API_KEY}
          ENV

      - name: Ship env file to server
        # Atomic write: scp → .new sibling, then `mv` (a POSIX rename
        # on the same filesystem) swaps it in. A network blip during
        # scp leaves the existing .env.test intact; the half-written
        # file lands at .new and either retries or surfaces as a
        # non-zero exit. Without this, scp's in-place truncate
        # could leave docker-compose reading a malformed env at the
        # next container swap.
        run: |
          set -euo pipefail
          scp -o ServerAliveInterval=15 \
            .env.test.rendered \
            root@${{ env.SERVER_HOST }}:/root/kds/.env.test.new
          ssh -o ServerAliveInterval=15 root@${{ env.SERVER_HOST }} \
            'mv /root/kds/.env.test.new /root/kds/.env.test'

      - name: Run deploy.sh staging on the server
        env:
          SHA: ${{ needs.build.outputs.commit_sha }}
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          ssh -o ServerAliveInterval=15 -o ServerAliveCountMax=4 \
            root@${{ env.SERVER_HOST }} "
              set -euo pipefail
              cd /root/kds
              # The legacy deployer left .last-deployment-images and
              # other ephemera in the working tree. Stash anything
              # uncommitted so `git reset --hard` below doesn't refuse
              # to clobber it. The state we actually care about lives
              # outside the repo (/var/lib/kds-deploy).
              git stash --include-untracked --quiet || true
              git fetch origin test
              git reset --hard origin/test
              export GHCR_USER='${GHCR_USER}'
              export GHCR_TOKEN='${GHCR_TOKEN}'
              ./scripts/deploy.sh staging ${SHA}
            "

      # The post-deploy public probe lives inside scripts/deploy.sh
      # (verify_and_promote step), which runs on the deploy box itself.
      # Cloudflare lets the server's own IP through but blocks
      # GitHub-hosted runner IPs with a 403 WAF rule, so duplicating
      # the probe at the workflow layer reliably reports a healthy
      # deploy as failed. Trust deploy.sh's verdict.

      - name: Rollback on failure
        if: failure()
        run: |
          # Rollback re-syncs the worktree before calling deploy.sh —
          # if the deploy step crashed before its own reset succeeded,
          # the rollback script may not exist on disk yet.
          ssh root@${{ env.SERVER_HOST }} '
            set -euo pipefail
            cd /root/kds
            git stash --include-untracked --quiet || true
            git fetch origin test
            git reset --hard origin/test
            ./scripts/deploy.sh staging-rollback
          '

      - name: Cleanup workspace
        if: always()
        run: rm -f .env.test.rendered
