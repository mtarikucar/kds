name: Quality Gates

# Lint + typecheck + unit tests + contract-drift, as a blocking gate.
# Runs standalone on every PR, and is `workflow_call`ed by both deploy
# pipelines (test-deploy.yml, release-deploy.yml) so nothing reaches a
# Docker build — let alone a server — without a green suite.

on:
  pull_request:
  workflow_call:

permissions:
  contents: read

env:
  # jsdom 27 (frontend tests) needs require(esm), i.e. Node >= 20.19;
  # matches backend/landing Dockerfiles which already run node:20.
  NODE_VERSION: '20.x'

jobs:
  backend-quality:
    name: Backend lint + typecheck + tests
    runs-on: ubuntu-latest
    timeout-minutes: 40
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npm run lint:ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm run test:ci

  backend-e2e:
    name: Backend e2e (real Postgres)
    runs-on: ubuntu-latest
    timeout-minutes: 12
    defaults:
      run:
        working-directory: backend
    # Real Postgres so write paths run against the actual schema. Mocked-Prisma
    # unit tests cannot catch a create that feeds null/undefined into a NOT NULL
    # relation FK (the engine throws "Argument `<relation>` is missing"); these
    # e2e specs exercise the device-slot / stock-deduction / onboarding write
    # paths against a live DB. PostGIS image matches dev/prod. Redis is required
    # too: AppService + the entitlement-invalidation bus open Redis clients at
    # boot (default redis://localhost:6379); with no Redis reachable the dangling
    # client keeps the process alive and jest never exits (a 25-min timeout).
    services:
      postgres:
        image: postgis/postgis:16-3.4-alpine
        env:
          POSTGRES_USER: e2e
          POSTGRES_PASSWORD: e2e
          POSTGRES_DB: kds_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U e2e"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      # Secrets come from test/setup.ts, which runs before the app boots.
      DATABASE_URL: postgresql://e2e:e2e@localhost:5432/kds_e2e
      REDIS_URL: redis://localhost:6379
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Sync schema to the test DB
        # db push (not migrate deploy): the migration history is not replayable
        # from scratch; db push builds the current schema in one shot, which is
        # exactly what an ephemeral test DB needs.
        run: npx prisma db push --skip-generate --accept-data-loss

      - name: E2E tests (real DB)
        run: npm run test:e2e

  frontend-quality:
    name: Frontend lint + typecheck + tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Lint
        # --max-warnings 200 baseline lives in the package script; ratchet
        # tracked in docs/architecture/QUALITY_AUDIT.md.
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm run test:ci

  contract-drift:
    name: Backend/frontend contract drift
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Check mirrored constants
        run: node scripts/check-contract-drift.mjs

      - name: Check i18n locale parity
        run: node scripts/check-i18n-parity.mjs

      - name: Check i18n value drift (no NEW English placeholders)
        run: node scripts/check-i18n-value-drift.mjs --gate-new scripts/i18n-value-drift-baseline.json
