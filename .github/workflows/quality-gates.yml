name: Quality Gates

# Lint + typecheck + unit tests + contract-drift, as a blocking gate.
# Runs standalone on every PR, and is `workflow_call`ed by both deploy
# pipelines (test-deploy.yml, release-deploy.yml) so nothing reaches a
# Docker build — let alone a server — without a green suite.

on:
  pull_request:
  workflow_call:

permissions:
  contents: read

env:
  # jsdom 27 (frontend tests) needs require(esm), i.e. Node >= 20.19;
  # matches backend/landing Dockerfiles which already run node:20.
  NODE_VERSION: '20.x'

jobs:
  backend-quality:
    name: Backend lint + typecheck + tests
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npm run lint:ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm test

  frontend-quality:
    name: Frontend lint + typecheck + tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Lint
        # --max-warnings 200 baseline lives in the package script; ratchet
        # tracked in docs/architecture/QUALITY_AUDIT.md.
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm run test:ci

  contract-drift:
    name: Backend/frontend contract drift
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Check mirrored constants
        run: node scripts/check-contract-drift.mjs

      - name: Check i18n locale parity
        run: node scripts/check-i18n-parity.mjs
