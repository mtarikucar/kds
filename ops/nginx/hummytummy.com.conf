# ============================================================================
# hummytummy.com — PRODUCTION host nginx vhost (SOURCE OF TRUTH)
# ============================================================================
# ⚠️  RECONSTRUCTED to mirror the observed prod behaviour (SPA at root, /app/* →
#     301 root, /api → backend). Before relying on it, CAPTURE THE LIVE PROD
#     VHOST verbatim and reconcile:
#
#         ssh root@38.242.233.166 'nginx -T' | sed -n '/server_name hummytummy.com/,/^}/p'
#
#     then update this file to match exactly (extra headers, gzip, logging, etc.).
#     Do NOT apply this to prod blind — prod is already correct; this file exists
#     so prod stops being the only place the routing lives.
#
# Prod container ports (docker-compose.prod.yml):
#   frontend SPA → 127.0.0.1:8080      backend API → 127.0.0.1:3000
#   landing (decoupled → marketing.hummytummy.com) → 127.0.0.1:3100
# ============================================================================

server {
    listen 80;
    listen [::]:80;
    server_name hummytummy.com www.hummytummy.com;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://hummytummy.com$request_uri; }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name hummytummy.com;

    ssl_certificate     /etc/letsencrypt/live/hummytummy.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hummytummy.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 25m;

    # Security headers — apply to every response from this vhost. `always`
    # so they're emitted on error responses too. HSTS opts the apex+subs
    # into HTTPS-only for 2y (preload-eligible). NOTE: if you ever need to
    # serve plain HTTP for a subdomain, scope HSTS accordingly first.
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Prometheus scrape endpoint is NEVER public. The monitoring stack
    # scrapes the backend container directly over the docker network; there
    # is no reason for it to be reachable from the internet. 404 (not 403)
    # so its existence isn't even confirmed. Defence in depth alongside the
    # backend's METRICS_TOKEN and the loopback-only container port binding.
    location = /api/metrics { return 404; }

    location /api/ {
        proxy_pass http://127.0.0.1:3000;
    }

    location /uploads/ {
        proxy_pass http://127.0.0.1:3000/uploads/;
    }

    location /socket.io/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location = /app { return 301 /; }
    location /app/  { rewrite ^/app/(.*)$ /$1 permanent; }

    location / {
        proxy_pass http://127.0.0.1:8080;
    }
}
