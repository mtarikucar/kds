# ============================================================================
# staging.hummytummy.com — host nginx vhost (SOURCE OF TRUTH)
# ============================================================================
# This file is the canonical staging edge config. It mirrors prod's structure
# (SPA at the domain ROOT, legacy /app/* → 301 to root) — the SPA is built with
# Vite base '/' (see frontend/vite.config.ts), so it MUST be served at the root,
# not under /app.
#
# History: staging drifted — it kept the OLD layout (landing at /, SPA at /app)
# after prod migrated to SPA-at-root, so the SPA's /assets/* requests hit the
# landing app and returned text/html → the SPA wouldn't load. Fixed 2026-06-22.
#
# Apply with ops/nginx/apply.sh (backs up, `nginx -t`, then reloads). Keep this
# file in sync with the server; diff against `nginx -T` after any manual change.
#
# Staging container ports (docker-compose.staging.yml):
#   frontend SPA  → 127.0.0.1:5175      backend API → 127.0.0.1:3002
#   landing (legacy, not at root) → 127.0.0.1:3102
# ============================================================================

server {
    listen 80;
    listen [::]:80;
    server_name staging.hummytummy.com;
    # certbot owns the ACME challenge + the https upgrade.
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name staging.hummytummy.com;

    # --- TLS (certbot-managed; keep in sync with the live cert paths) ---
    ssl_certificate     /etc/letsencrypt/live/staging.hummytummy.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/staging.hummytummy.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Upload bodies (invoices / product images).
    client_max_body_size 25m;

    # Shared proxy headers.
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Audit H6: /api/metrics is a Prometheus scrape target. Even on
    # staging we refuse it from public ingress and rely on loopback
    # scraping (mirrors prod posture).
    location = /api/metrics {
        return 404;
    }

    # 1) Backend API (NestJS global prefix /api preserved).
    location /api/ {
        proxy_pass http://127.0.0.1:3002;
    }

    # 2) Static uploads served by the backend.
    location /uploads/ {
        proxy_pass http://127.0.0.1:3002/uploads/;
    }

    # 3) WebSocket (socket.io).
    location /socket.io/ {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # 4) Legacy /app/* → permanent redirect to the root SPA (mirrors prod).
    location = /app { return 301 /; }
    location /app/  { rewrite ^/app/(.*)$ /$1 permanent; }

    # 5) Root = the SPA (frontend container). base:'/' assets (/assets/*) are
    #    served from here, NOT the landing app.
    location / {
        proxy_pass http://127.0.0.1:5175;
    }
}
