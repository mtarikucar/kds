# ============================================================================
# grafana.hummytummy.com — PRODUCTION host nginx vhost (SOURCE OF TRUTH)
# ============================================================================
# Edge config for the self-hosted Grafana (docker-compose.monitoring.yml
# `grafana` service, bound to 127.0.0.1:3001). Grafana's OWN login is the auth
# boundary (GF_USERS_ALLOW_SIGN_UP=false); Cloudflare fronts it.
#
# ⚠️  REQUIRES a user-side Cloudflare DNS record: grafana → VPS IP
#     (38.242.233.166). Until that record exists the hostname will not resolve.
#     Issue the TLS cert once DNS resolves:
#         certbot certonly --webroot -w /var/www/certbot -d grafana.hummytummy.com
#
# Apply with ops/nginx/apply.sh (backs up, `nginx -t`, then reloads):
#         sudo /root/kds/ops/nginx/apply.sh grafana.hummytummy.com.conf
#
# Monitoring container port (docker-compose.monitoring.yml):
#   grafana (host 3001 → container 3000) → 127.0.0.1:3001
# ============================================================================

server {
    listen 80;
    listen [::]:80;
    server_name grafana.hummytummy.com;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name grafana.hummytummy.com;

    ssl_certificate     /etc/letsencrypt/live/grafana.hummytummy.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/grafana.hummytummy.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 25m;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    location / {
        proxy_pass http://127.0.0.1:3001;
        # Grafana Live (dashboards, alerting UI) uses WebSockets.
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
