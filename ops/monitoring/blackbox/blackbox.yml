# Blackbox exporter modules for external uptime + TLS probes.
modules:
  http_2xx:
    prober: http
    timeout: 8s
    http:
      method: GET
      valid_http_versions: ["HTTP/1.1", "HTTP/2.0"]
      # 2xx is the default success range; require TLS so an http downgrade fails.
      fail_if_not_ssl: true
      preferred_ip_protocol: ip4
      follow_redirects: true
