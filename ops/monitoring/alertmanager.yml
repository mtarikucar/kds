# Alertmanager configuration — KDS observability stack.
#
# TEMPLATE: the __PLACEHOLDER__ tokens are rendered at container start (sed) from
# env mapped to the canonical .env.production SMTP names (EMAIL_* / ADMIN_EMAIL)
# in docker-compose.monitoring.yml, so the repo carries no credentials and the
# backend + Alertmanager share one SMTP source of truth.

global:
  resolve_timeout: 5m
  smtp_from: "__ALERT_EMAIL_FROM__"
  smtp_smarthost: "__ALERT_SMTP_SMARTHOST__"
  smtp_auth_username: "__ALERT_SMTP_USERNAME__"
  smtp_auth_password: "__ALERT_SMTP_PASSWORD__"
  smtp_require_tls: true

route:
  group_by: ["alertname", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: email-default
  routes:
    # The always-firing Watchdog → a daily heartbeat email. If this heartbeat
    # STOPS arriving, the alerting pipeline itself is down (a normal alert can
    # never tell you that). For a zero-noise external dead-man's switch instead,
    # point ALERT_WATCHDOG_URL at a healthchecks.io ping and use the commented
    # webhook in the watchdog-heartbeat receiver below.
    - matchers:
        - alertname = "Watchdog"
      receiver: watchdog-heartbeat
      group_wait: 0s
      group_interval: 5m
      repeat_interval: 24h
    # Critical alerts page faster and re-notify hourly.
    - matchers:
        - severity = "critical"
      receiver: email-default
      group_wait: 10s
      repeat_interval: 1h

# Suppress lower-severity noise while a critical alert for the same component
# is already firing.
inhibit_rules:
  - source_matchers:
      - severity = "critical"
    target_matchers:
      - severity = "warning"
    equal: ["component"]

receivers:
  - name: email-default
    email_configs:
      - to: "__ALERT_EMAIL_TO__"
        send_resolved: true

  - name: watchdog-heartbeat
    email_configs:
      - to: "__ALERT_EMAIL_TO__"
        send_resolved: false
        headers:
          Subject: "[KDS Monitoring] Watchdog heartbeat — alerting pipeline OK"
    # For a silent external dead-man's switch, set ALERT_WATCHDOG_URL to a
    # healthchecks.io (or Cloudflare-worker) ping URL and uncomment:
    # webhook_configs:
    #   - url: "__ALERT_WATCHDOG_URL__"
    #     send_resolved: false
