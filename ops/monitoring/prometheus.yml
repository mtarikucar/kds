# Prometheus scrape configuration for the KDS observability stack.
#
# TEMPLATE: __METRICS_TOKEN__ and __KDS_BACKEND_TARGET__ are rendered from env
# by the prometheus service entrypoint (sed) in docker-compose.monitoring.yml
# (Prometheus does not expand env vars inside its own config). Every other
# target is a static container:port on the docker networks, no secret.

global:
  scrape_interval: 30s
  scrape_timeout: 10s
  evaluation_interval: 30s
  external_labels:
    monitor: kds-monitor

# All rule files (app / infra / watchdog) live in ops/monitoring/rules and are
# mounted at /etc/prometheus/rules (see docker-compose.monitoring.yml).
rule_files:
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  # The KDS NestJS backend — the app-level RED + business metrics. Bearer token
  # (METRICS_TOKEN) rendered by the entrypoint; scraped tighter (15s) than infra.
  - job_name: kds-backend
    metrics_path: /api/metrics
    scheme: http
    scrape_interval: 15s
    authorization:
      type: Bearer
      credentials: __METRICS_TOKEN__
    static_configs:
      - targets:
          - __KDS_BACKEND_TARGET__
        labels:
          service: kds-backend

  # Prometheus self-scrape.
  - job_name: prometheus
    metrics_path: /metrics
    static_configs:
      - targets:
          - localhost:9090

  # Host CPU / RAM / disk / load / filesystem.
  - job_name: node
    static_configs:
      - targets:
          - node-exporter:9100
        labels:
          service: host

  # Per-container CPU / mem / net / fs / restarts.
  - job_name: cadvisor
    static_configs:
      - targets:
          - cadvisor:8080
        labels:
          service: containers

  # PostgreSQL (connections, tx, locks, size, pg_up).
  - job_name: postgres
    static_configs:
      - targets:
          - postgres-exporter:9187
        labels:
          service: postgres

  # Redis (memory, hit-rate, connected clients, redis_up).
  - job_name: redis
    static_configs:
      - targets:
          - redis-exporter:9121
        labels:
          service: redis

  # External uptime + TLS-expiry probes via the blackbox exporter.
  - job_name: blackbox-http
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - https://hummytummy.com
          - https://hummytummy.com/api/health
          - https://developer.hummytummy.com
          - https://help.hummytummy.com
    relabel_configs:
      # The classic blackbox indirection: the probed URL is passed as ?target=,
      # and the actual scrape hits the blackbox exporter.
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115
