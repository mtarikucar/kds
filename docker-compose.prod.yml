version: '3.8'

name: kds-prod

services:
  # PostgreSQL Database
  postgres:
    env_file:
      - .env.production
    # Major-pinned. Bumping to a minor (15.6 / 15.7) tag triggers a
    # container recreate on the next pull, and the existing data
    # volume isn't guaranteed to be readable across all minors
    # without a one-shot pg_upgrade. Major (15) is enough to keep
    # us out of pg14/pg16 wire-format land.
    image: postgres:15-alpine
    container_name: kds_postgres_prod
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-restaurant_pos_prod}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      # Pin container TZ so timestamps in pg_dump / pg_stat align with
      # the wall-clock business day. Application logic always normalises
      # via tenant.timezone, so this is purely for ops legibility.
      TZ: ${TZ:-Europe/Istanbul}
    # Audit H8: ship Postgres with sane statement / transaction /
    # lock timeouts so a single runaway query can't tie up a pool
    # connection forever. Values chosen for the OLTP workload here:
    #   * statement_timeout=60s    — anything longer is almost
    #     certainly a bug (analytics use the dedicated read path).
    #   * idle_in_transaction_session_timeout=30s — an open tx that
    #     forgot to commit holds row-level locks; auto-abort.
    #   * lock_timeout=10s         — refuse to wait forever on a
    #     row lock; surfaces deadlocks as application errors.
    # Override values per-statement when a job legitimately needs
    # longer (admin reports, migrations).
    command:
      - postgres
      - -c
      - statement_timeout=60000
      - -c
      - idle_in_transaction_session_timeout=30000
      - -c
      - lock_timeout=10000
    ports:
      - '127.0.0.1:5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kds_network
    deploy:
      resources:
        # Audit H5: reserve floor + cap for postgres. Pre-fix the
        # container had no limits — a runaway backend leak could
        # OOM the shared DB. 2G suits the current dataset; bump
        # when pg_database_size exceeds ~1.2G.
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 768M

  # Redis Cache
  redis:
    env_file:
      - .env.production
    # Major-pinned for the same reason as postgres — the redis 7 → 7.2
    # bump on staging failed to start against the existing RDB volume.
    image: redis:7-alpine
    container_name: kds_redis_prod
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
      # See docker-compose.staging.yml for the rationale — cold redis
      # needs ~15-20s before its first PING reliably succeeds.
      start_period: 20s
    networks:
      - kds_network
    deploy:
      resources:
        # Audit H5: small but explicit cap for redis. The current
        # workload (throttler counters + outbox-claim metadata) sits
        # well under 64MB; cap at 256MB so a runaway pub/sub fanout
        # can't pressure postgres on the same host.
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M

  # Backend API (NestJS)
  backend:
    env_file:
      - .env.production
    # scripts/deploy.sh moves the :current tag atomically once a deploy
    # is verified. The immutable :vX.Y.Z tag is what gets pulled and
    # SHA-verified; :current is the pointer compose follows.
    image: ghcr.io/mtarikucar/kds/backend:current
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: kds_backend_prod
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      # The renewal cron is declared as `0 2 * * *` and must fire at
      # 02:00 Europe/Istanbul (low-traffic window before breakfast
      # service). Without TZ, NestJS @Cron uses the Node process TZ
      # which defaults to UTC on Alpine — pushing the job to 05:00
      # local. Pin TZ here so the cron's wall-clock matches its intent
      # and our SLA "we charge at 02:00 TR time" stays honest.
      TZ: ${TZ:-Europe/Istanbul}
      PORT: 3000
      # Audit H5: cap V8 heap below the container mem_limit so Node
      # exits with a clean OOMError rather than the kernel killing
      # the process (which loses in-flight requests + corrupt logs).
      # 1536M leaves ~512M headroom for native buffers + libuv.
      NODE_OPTIONS: ${NODE_OPTIONS:---max-old-space-size=1536}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-restaurant_pos_prod}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/2
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-30d}
      SUPERADMIN_JWT_SECRET: ${SUPERADMIN_JWT_SECRET:-${JWT_SECRET}}
      CORS_ORIGIN: ${CORS_ORIGIN:?CORS_ORIGIN must be set in production}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      PAYTR_MERCHANT_ID: ${PAYTR_MERCHANT_ID}
      PAYTR_MERCHANT_KEY: ${PAYTR_MERCHANT_KEY}
      PAYTR_MERCHANT_SALT: ${PAYTR_MERCHANT_SALT}
      PAYTR_BASE_URL: ${PAYTR_BASE_URL:-https://www.paytr.com}
      PAYTR_TEST_MODE: ${PAYTR_TEST_MODE:-false}
      BACKEND_URL: ${BACKEND_URL:-https://hummytummy.com}
      EMAIL_HOST: ${EMAIL_HOST}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_SECURE: ${EMAIL_SECURE:-false}
      EMAIL_USER: ${EMAIL_USER}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD}
      EMAIL_FROM: ${EMAIL_FROM}
      DESKTOP_RELEASE_API_KEY: ${DESKTOP_RELEASE_API_KEY}
      DEFAULT_TRIAL_DAYS: ${DEFAULT_TRIAL_DAYS:-14}
      TRIAL_REMINDER_DAYS: ${TRIAL_REMINDER_DAYS:-3}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      # HummyTummy Phase 11+ — at-rest encryption key for integration
      # credentials. Used by EnvKmsProvider; switch to AWS KMS in prod by
      # setting KMS_PROVIDER=aws + the AWS-side env vars.
      INTEGRATION_KEY: ${INTEGRATION_KEY:?INTEGRATION_KEY must be set in production}
      KMS_PROVIDER: ${KMS_PROVIDER:-env}
      KMS_MASTER_KEY: ${KMS_MASTER_KEY:-}
      # OpenTelemetry — opt-in. Leave empty to keep using the existing
      # Sentry-based tracing path; set to your collector URL to enable
      # OTLP HTTP export.
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-hummytummy-backend}
    ports:
      # Audit B4: bind to 127.0.0.1 so the backend container is only
      # reachable through nginx (which terminates TLS + applies
      # WAF/edge rules). Pre-fix the container listened on every
      # interface; an external attacker could hit `http://<vps-ip>:3000/api/*`
      # in plaintext, bypassing TLS, HSTS, and any edge rate limiting.
      - '127.0.0.1:3000:3000'
    volumes:
      - invoice_storage:/app/storage
      - uploads_storage:/app/uploads
    deploy:
      resources:
        # Audit H5: cap backend memory so a leak in app code cannot
        # OOM the shared postgres + redis (both colocated on the
        # same host). 2G is comfortably above the steady-state heap
        # (~600M) and lets a burst handle the trial-end newsletter
        # blast. NODE_OPTIONS below caps the V8 heap so Node aborts
        # cleanly instead of the kernel reaping the container.
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      # /api/health is the durable contract — exists in every image we've
      # ever shipped, so rollback to an older image is always probe-able.
      # /healthz/ready is richer (KMS + payment/fiscal registries) but
      # only exists in HummyTummy+ images, which broke the rollback path.
      # See docker-compose.staging.yml for the full story.
      test: ['CMD', 'curl', '-f', 'http://0.0.0.0:3000/api/health']
      interval: 30s
      timeout: 10s
      retries: 5
      # See docker-compose.staging.yml for rationale — backend bootstrap
      # has grown past the old 40s budget.
      start_period: 240s
    networks:
      - kds_network

  # Frontend (React)
  frontend:
    env_file:
      - .env.production
    image: ghcr.io/mtarikucar/kds/frontend:current
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
      args:
        VITE_API_URL: ${VITE_API_URL:-https://hummytummy.com/api}
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-https://hummytummy.com}
        VITE_SOCKET_URL: ${VITE_SOCKET_URL:-https://hummytummy.com}
        VITE_WS_URL: ${VITE_WS_URL:-wss://hummytummy.com}
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID}
    container_name: kds_frontend_prod
    restart: always
    depends_on:
      - backend
    ports:
      - '8080:80'
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://127.0.0.1:80']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - kds_network

  # Landing Page (Next.js)
  landing:
    env_file:
      - .env.production
    image: ghcr.io/mtarikucar/kds/landing:current
    build:
      context: ./landing
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://hummytummy.com/api}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://hummytummy.com}
    container_name: kds_landing_prod
    restart: always
    environment:
      NODE_ENV: production
    ports:
      - '3100:3000'
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://0.0.0.0:3000/api/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - kds_network

  # Developer Docs Portal (Nextra / Next.js)
  developer:
    env_file:
      - .env.production
    image: ghcr.io/mtarikucar/kds/developer:current
    build:
      context: ./developer
      dockerfile: Dockerfile
    container_name: kds_developer_prod
    restart: always
    environment:
      NODE_ENV: production
    ports:
      - '3200:3000'
    healthcheck:
      # The docs app has no /api/health route; /tr is the default-locale
      # landing page (nextra/locales middleware redirects / → /tr) and
      # returns 200, so it's the durable liveness probe.
      test: ['CMD', 'wget', '--spider', '-q', 'http://0.0.0.0:3000/tr']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - kds_network

  # Help Center (Nextra / Next.js) — help.hummytummy.com (customer/operator docs).
  # Split out of the developer portal; same image shape, distinct host port.
  help:
    env_file:
      - .env.production
    image: ghcr.io/mtarikucar/kds/help:current
    build:
      context: ./help
      dockerfile: Dockerfile
    container_name: kds_help_prod
    restart: always
    environment:
      NODE_ENV: production
    ports:
      - '3201:3000'
    healthcheck:
      # No /api/health route; /tr is the default-locale landing page
      # (nextra/locales middleware redirects / → /tr) and returns 200.
      test: ['CMD', 'wget', '--spider', '-q', 'http://0.0.0.0:3000/tr']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - kds_network


volumes:
  postgres_data:
  redis_data:
  invoice_storage:
  uploads_storage:

networks:
  kds_network:
    driver: bridge
