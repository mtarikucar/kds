<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <rect width="800" height="600" fill="url(#grid)"/>

  <!-- icon: wrench + spark -->
  <g transform="translate(330,180)" fill="none" stroke="white" stroke-width="8" stroke-linecap="round" stroke-linejoin="round">
    <path d="M 30 100 L 110 20 Q 130 0 150 20 Q 170 40 150 60 L 70 140 Z"/>
    <circle cx="60" cy="130" r="14"/>
    <path d="M 180 80 L 200 80 M 190 70 L 190 90"/>
  </g>

  <text x="400" y="430" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Inter', Arial, sans-serif" font-size="40" font-weight="600" fill="white">Kurulum & Hizmet</text>
  <text x="400" y="475" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Inter', Arial, sans-serif" font-size="22" fill="rgba(255,255,255,0.7)">HummyTummy uzman ekibi</text>
</svg>
