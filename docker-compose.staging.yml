version: '3.8'

name: kds-staging

services:
  # PostgreSQL Database (Shared - uses staging database)
  postgres:
    env_file:
      - .env.test
    # Major-pin; see docker-compose.prod.yml for the rationale.
    image: postgres:15-alpine
    container_name: kds_postgres_staging
    restart: always
    ports:
      - '5433:5432'
    volumes:
      - postgres_data_staging:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kds_staging_network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G

  # Redis Cache (Shared - uses DB 1 for staging)
  redis:
    env_file:
      - .env.test
    image: redis:7-alpine
    container_name: kds_redis_staging
    restart: always
    ports:
      - '6380:6379'
    volumes:
      - redis_data_staging:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
      # Cold container needs ~15-20s on this box before redis-cli
      # responds reliably; without start_period the first 5 checks
      # were racing the bind and marking it unhealthy.
      start_period: 20s
    networks:
      - kds_staging_network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  # Backend API (NestJS) - Staging
  backend:
    env_file:
      - .env.test
    image: ghcr.io/mtarikucar/kds/backend-staging:current
    container_name: kds_backend_staging
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: staging
      PORT: 3002
      # Staging-side mirror of the prod env. INTEGRATION_KEY and KMS keys
      # come from .env.test; OTel collector left disabled by default.
      INTEGRATION_KEY: ${INTEGRATION_KEY:-staging-only-do-not-use}
      KMS_PROVIDER: ${KMS_PROVIDER:-env}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
    ports:
      - '3002:3002'
    volumes:
      - invoice_storage_staging:/app/storage
    healthcheck:
      # /api/health (basic alive + DB + Redis) is the safe probe URL
      # because it exists in every image we've ever shipped. /healthz/ready
      # is a richer K8s-style probe but only exists in HummyTummy+ images;
      # using it here meant the rollback target (older image without that
      # route) always 404'd and was eternally "unhealthy" — cascading the
      # failure of every rollback attempt. /api/health is the durable
      # contract.
      test: ['CMD', 'curl', '-f', 'http://localhost:3002/api/health']
      interval: 30s
      timeout: 10s
      retries: 5
      # Cold bootstrap of the HummyTummy-sized backend takes ~3-4 min on
      # this 1 CPU / 1GB limit (NestJS module init + Prisma introspection
      # over 50+ tables). 240s leaves margin against the observed cold
      # path.
      start_period: 240s
    networks:
      - kds_staging_network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  # Frontend (React) - Staging
  frontend:
    env_file:
      - .env.test
    image: ghcr.io/mtarikucar/kds/frontend-staging:current
    container_name: kds_frontend_staging
    restart: always
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - '5175:80'
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://127.0.0.1:80']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - kds_staging_network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  # Landing Page (Next.js) - Staging
  landing:
    env_file:
      - .env.test
    image: ghcr.io/mtarikucar/kds/landing-staging:current
    container_name: kds_landing_staging
    restart: always
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: https://staging.hummytummy.com/api
      NEXT_PUBLIC_SITE_URL: https://staging.hummytummy.com
    ports:
      - '3102:3000'
    healthcheck:
      test: ['CMD', 'wget', '-q', '-O', '-', 'http://0.0.0.0:3000/api/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - kds_staging_network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

volumes:
  postgres_data_staging:
  redis_data_staging:
  invoice_storage_staging:

networks:
  kds_staging_network:
    driver: bridge
