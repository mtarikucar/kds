<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <title>HummyTummy</title>
  </head>
  <body>
    <!-- Pre-render splash INSIDE #root. This is the literal HTML served for
         every route (nginx try_files → index.html), so Google's OAuth homepage
         check finds a real, crawlable link to the privacy policy & terms even
         though it parses the raw HTML without executing JavaScript or following
         the client-side "/" → "/login" redirect. React's createRoot().render()
         replaces these children on mount, so users only ever see the full app;
         if JS is disabled or fails to load, this remains a working fallback. -->
    <div id="root">
      <div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.25rem;font-family:Inter,system-ui,-apple-system,sans-serif;background:linear-gradient(135deg,#fff7ed 0%,#ffffff 60%);color:#1e293b;">
        <div style="font-size:1.5rem;font-weight:700;letter-spacing:-0.01em;">HummyTummy</div>
        <div style="font-size:0.8125rem;color:#94a3b8;">Loading…</div>
        <nav style="font-size:0.75rem;color:#64748b;">
          <a href="/privacy" style="color:#64748b;text-decoration:none;">Privacy Policy</a>
          <span style="margin:0 0.5rem;color:#cbd5e1;">·</span>
          <a href="/terms" style="color:#64748b;text-decoration:none;">Terms of Service</a>
        </nav>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
