server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Handle /app/* paths (for subdomain access where HTML references /app/assets/...)
    # This strips /app prefix and serves from root.
    #
    # Order matters: the inner hashed-asset regex MUST come first so
    # fingerprinted bundles get a 1-year immutable cache. Anything else
    # under /app (including /app/admin/users → SPA fallback to
    # index.html) MUST explicitly send no-cache so Cloudflare doesn't
    # edge-cache the HTML entry point and freeze clients on an old
    # bundle hash — which is exactly what happened on staging: `/app/`
    # was stuck with Last-Modified from 12 days prior because the
    # previous config had no Cache-Control for SPA-fallback responses
    # and Cloudflare defaulted to "cache forever".
    location /app {
        alias /usr/share/nginx/html;

        # Hashed assets (vite adds a content hash): safe to cache forever.
        location ~* ^/app/.*\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Everything else under /app resolves to the SPA's index.html via
        # try_files. Force no-cache so every navigation gets the latest
        # HTML, which in turn references the latest hashed bundles.
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Hashed assets at the root (same treatment as under /app).
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Root-level SPA routing. Uses the same no-cache policy as /app so
    # direct `staging.hummytummy.com/` hits also get a fresh HTML entry.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Explicit no-cache for /index.html (redundant with / above but kept
    # for defence-in-depth if a proxy rewrites the request).
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }
}
